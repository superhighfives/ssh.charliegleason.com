# fly.toml app configuration file generated for ssh-charliegleason on 2026-05-19T11:21:58+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ssh-charliegleason'
primary_region = 'lhr'

[build]

[env]
  HTTP_PORT = '8080'
  REDIRECT_TARGET = 'https://www.charliegleason.com'
  SSH_IDLE_TIMEOUT_MS = '300000'
  SSH_MAX_CONCURRENT = '50'
  SSH_PORT = '2222'
  SSH_SESSION_MAX_MS = '1800000'

[[mounts]]
  source = 'host_keys'
  destination = '/data'
  initial_size = '1gb'

[[services]]
  protocol = 'tcp'
  internal_port = 2222
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 22

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 75

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

# HTTP redirect: apex web traffic 301s to https://www.charliegleason.com.
# Fly terminates TLS on :443 and forwards to internal_port. :80 is upgraded
# to HTTPS by Fly's force_https handler.
[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
